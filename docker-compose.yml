services:
  domain:
    build: .
    image: ${DOCKERHUB_IMAGE:-gustavomeira1/tp3so:latest}
    container_name: tp3-domain
    command: node src/services/domain/index.js
    environment:
      PORT: 7000
      LOW_STOCK_THRESHOLD: 1
    expose:
      - "7000"

  rest:
    image: ${DOCKERHUB_IMAGE:-gustavomeira1/tp3so:latest}
    build: .
    container_name: tp3-rest
    command: node src/services/rest/index.js
    depends_on:
      - domain
    environment:
      PORT: 8080
      DOMAIN_URL: http://domain:7000
    ports:
      - "8080:8080"

  graphql:
    image: ${DOCKERHUB_IMAGE:-gustavomeira1/tp3so:latest}
    build: .
    container_name: tp3-graphql
    command: node src/services/graphql/index.js
    depends_on:
      - domain
    environment:
      PORT: 8082
      DOMAIN_URL: http://domain:7000
    ports:
      - "8082:8082"

  grpc:
    image: ${DOCKERHUB_IMAGE:-gustavomeira1/tp3so:latest}
    build: .
    container_name: tp3-grpc
    command: node src/services/grpc/index.js
    depends_on:
      - domain
    environment:
      GRPC_PORT: 50051
      DOMAIN_URL: http://domain:7000
    ports:
      - "50051:50051"

  websocket:
    image: ${DOCKERHUB_IMAGE:-gustavomeira1/tp3so:latest}
    build: .
    container_name: tp3-websocket
    command: node src/services/websocket/index.js
    depends_on:
      - domain
    environment:
      PORT: 8081
      DOMAIN_URL: http://domain:7000
    ports:
      - "8081:8081"
